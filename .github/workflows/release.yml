name: Mnemo Private Beta Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version, for example 0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  platform-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    environment: private-beta
    strategy:
      fail-fast: false
      # Serializing uploads prevents parallel jobs from racing while updating
      # the shared GitHub release and latest.json manifest.
      max-parallel: 1
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            args: ""
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: Windows x86_64
            os: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          node --input-type=module -e 'const v=process.env.RELEASE_VERSION; if (!/^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/.test(v)) throw new Error(`Invalid version: ${v}`);'
      - name: Validate signing configuration
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/verify-release-config.mjs
      - name: Stamp Tauri version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: node --input-type=module -e 'import fs from "node:fs"; const p="src-tauri/tauri.conf.json"; const c=JSON.parse(fs.readFileSync(p)); c.version=process.env.RELEASE_VERSION; fs.writeFileSync(p, JSON.stringify(c, null, 2)+"\n");'
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - name: Build and upload signed desktop release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: Mnemo v${{ inputs.version }}
          releaseBody: "Mnemo private beta. See the README and beta validation checklist for installation and privacy behavior."
          releaseDraft: true
          prerelease: true
          projectPath: .
          args: ${{ matrix.args }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

  extension-release:
    name: Package browser extensions
    needs: platform-release
    runs-on: ubuntu-22.04
    environment: private-beta
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- extension/context-bridge.test.ts
      - run: npm run package:extension
      - name: Upload extension packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ inputs.version }}
        run: gh release upload "$RELEASE_TAG" artifacts/extension/* --clobber
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ inputs.version }}
        run: gh release edit "$RELEASE_TAG" --draft=false --prerelease=true
      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          mkdir -p release-assets
          gh release download "$RELEASE_TAG" \
            --pattern 'latest.json' \
            --pattern '*.sig' \
            --pattern '*.AppImage' \
            --pattern '*.dmg' \
            --pattern '*.msi' \
            --pattern '*.exe' \
            --dir release-assets
          node scripts/verify-release-artifacts.mjs release-assets release-assets
