name: Linux Private Beta Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version, for example 0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    environment: private-beta
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module -e 'const v=process.env.RELEASE_VERSION; if (!/^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/.test(v)) throw new Error(`Invalid version: ${v}`);'
      - name: Stamp Tauri version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module -e 'import fs from "node:fs"; const p="src-tauri/tauri.conf.json"; const c=JSON.parse(fs.readFileSync(p)); c.version=process.env.RELEASE_VERSION; fs.writeFileSync(p, JSON.stringify(c, null, 2)+"\n");'
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Package browser extensions
        run: npm run package:extension
      - name: Build and publish signed Tauri release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: Mnemo v${{ inputs.version }}
          releaseBody: "Linux private beta release. See the README and private-beta checklist for installation and privacy behavior."
          releaseDraft: false
          prerelease: false
          projectPath: .
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
      - name: Upload browser extensions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ inputs.version }}
        run: gh release upload "$RELEASE_TAG" artifacts/extension/* --clobber
